name: Obilet Uçuş Scraper

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Node.js kur
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Chrome kur
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Bağımlılıkları yükle
        run: PUPPETEER_SKIP_CHROMIUM_DOWNLOAD=true npm install

      - name: Scraper çalıştır
        run: npx ts-node src/scraper.ts
        env:
          CHROME_PATH: /usr/bin/google-chrome-stable

      - name: Sonuçları kaydet
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add fiyatlar.json
          git diff --staged --quiet || git commit -m "Fiyatlar güncellendi"
          git push
